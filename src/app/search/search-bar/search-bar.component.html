<div>
  <label for="search-input" class="visually-hidden">{{ searchLabel() }}</label>
  <input id="search-input"
         class="form-control"
         type="search"
         autocomplete="off"
         autocorrect="off"
         autocapitalize="off"
         spellcheck="false"
         [attr.aria-label]="searchLabel()"
         [placeholder]="searchLabel()"
         [formControl]="form"
         (focus)="focus$.next($any($event.target).value)"/>
</div>
