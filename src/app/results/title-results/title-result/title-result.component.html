<div class="">
  <div class="d-block text-truncate mw-100 title"><ngb-highlight [result]="result().title" [term]="term()" /></div>
  @if (result().line) {
    <div class="small opacity-75 poem">{{ result().line }}</div>
  } @else {
    <div class="small opacity-75 author">{{ result().author }}</div>
  }
</div>
