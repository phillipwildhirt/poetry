<div class="w-100 minw-100 minh-100">
  <div class="list-group">
    @let existsData = data();
    @if (existsData) {
      @for (result of existsData.results; track $index) {
        @if (isSkeleton(result)) {
          <div class="list-group-item">
            <app-title-skeleton/>
          </div>
        } @else if (isAuthor(result)) {
          <button type="button" class="list-group-item text-start" appListInteractionStateDirective (click)="authorClick(result)">
            <app-author-result [result]="result" [term]="existsData.term"/>
          </button>
        } @else if (isTitle(result)) {
          <button type="button" class="list-group-item text-start" appListInteractionStateDirective (click)="openPoem(result)">
            <app-title-result [result]="result" [term]="existsData.term"/>
          </button>
        }
      }
    }
  </div>
</div>
