<div class="w-100 minw-100 minh-100 p-4 overflow-auto">
  <div class="list-group">
    @if (loading()) {
      @for (i of skeletonRows; track i) {
        <div class="list-group-item">
          <div class="d-flex gap-2">
            <app-skeleton width="80px" height="1.25rem"/>
            <app-skeleton width="125px" height="1.25rem"/>
          </div>
        </div>
      }
    } @else {
      @let existsData = data();
      @if (existsData) {
        @for (result of existsData.results; track result.name) {
          <button type="button" class="list-group-item text-start" appListInteractionStateDirective>
            <app-author-result [result]="result" [term]="existsData.term"/>
          </button>
        }
      }
    }
  </div>
</div>
